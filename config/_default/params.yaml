appearance:
  theme_day: western
  theme_night: western
  font: native
  font_size: L

marketing:
  seo:
    site_type: Organization
    local_business_type: ''
    org_name: 'Moynihan Lab'
    description: 'Mycobacterial cell envelope biology — University of Western Ontario'
    twitter: ''
  analytics:
    google_analytics: ''
    baidu_tongji: ''
    google_tag_manager: ''
    microsoft_clarity: ''
  verification:
    google: ''
    baidu: ''

header:
  navbar:
    enable: true
    align: r
    show_logo: true
    show_language: false
    show_day_night: false
    show_search: true
    highlight_active_link: true

footer:
  copyright:
    notice: '© {year} Moynihan Lab · Schulich School of Medicine & Dentistry · Western University'
    license:
      enable: false

locale:
  date_format: 'Jan 2, 2006'
  time_format: '3:04 PM'
  address_format: en-us

features:
  syntax_highlighter:
    enable: false
  math:
    enable: false
  privacy_pack:
    enable: false
  avatar:
    gravatar: false
    shape: circle
  search:
    provider: wowchemy
  map:
    provider: 'mapnik'
    api_key: ''
    zoom: 15

extensions:
  decap_cms:
    branch: main
    local_backend: false
  academicons:
    enable: true

publications:
  date_format: January 2006
  citation_style: apa
